context:
  version: "1.7.1"
  python_min: "3.10"
  python_max: "3.13.9"

package:
  name: geokit
  version: ${{ version }}

source:
  url: https://github.com/FZJ-IEK3-VSA/geokit/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 71ccb8929b970ba6da109c72473e5b82144f427faa3d183b5d37ea4521f33957

build:
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation
  noarch: python
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<=${{ python_max }}
    - jupyter <=1.1.1
    - descartes <=1.1.0
    - pip <=26.0.1
    - matplotlib <=3.10.8
    - pandas >=1.4.0,<=2.3.3
    - numpy >=1.26.0,<=2.4.3
    - scipy >=1.10.0,<=1.16.3
    - scikit-learn >=1.3.0,<=1.8.0
    - gdal >=3.9.3,<=3.10
    - smopy >=0.0.7,<=0.0.8
    - geopandas >=1.0.0,<=1.1.3
    - psutil >=5.8.0,<=7.2.2
    - structlog <=25.5.0
    - rich <=14.3.3
    - pandas-stubs <=2.3.3.260113
    - scipy-stubs <=1.17.0.2
    - requests <=2.33.1

tests:
  - python:
      imports:
        - geokit
  - script:
      - pytest -n auto -vvv
    requirements:
      run:
        - pytest
        - pytest-xdist
        - typeguard <=4.5.1
        - python ${{ python_min }}.*
    files:
      source:
        - .

about:
  homepage: https://github.com/FZJ-IEK3-VSA/geokit
  summary: Geokit is a library that interfaces with GDAL to support general-purpose geospatial data analysis.
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - chrisjwin
    - shitabishmam
    - julian-belina
    - phil-fzj
