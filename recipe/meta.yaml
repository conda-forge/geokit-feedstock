{% set name = "geokit" %}
{% set version = "1.7.0" %}
{% set python_min = "3.10" %}
{% set python_max = "3.13.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/FZJ-IEK3-VSA/geokit/archive/refs/tags/v{{ version }}.tar.gz
  sha256: ffd1c2aea10ea681aab62bff8102093dc426b2b6fe43fe0f243cbb99ee5e580c

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation


requirements:
  host:
    - pip
    - python {{ python_min }}
    - hatchling
  run:
    - python >={{ python_min }},<={{ python_max }}
    - jupyter <=1.1.1
    - descartes <=1.1.0
    - pip <=26.0.1
    - matplotlib <=3.10.5
    - pandas >=1.4.0,<=2.3.3
    - numpy >=1.26.0,<=2.4.2
    - scipy >=1.10.0,<=1.16.3
    - scikit-learn >=1.3.0,<=1.8.0
    - gdal 3.9.3|3.10
    - smopy 0.0.7|0.0.8
    - geopandas >=1.0.0,<=1.1.2
    - psutil >=5.8.0,<=7.2.2
    - structlog <=25.5.0
    - rich <=14.3.2
    - pandas-stubs <=2.3.3
    - scipy-stubs <=1.17.0.2
    - requests <=2.32.5
    - typeguard <=4.4.4

test:
  imports:
    - geokit
  source_files:
    - .
  requires:
    - pytest-xdist
    - python {{ python_min }}
  commands:
    - pytest -n auto

about:
  home: https://github.com/FZJ-IEK3-VSA/geokit
  summary: GeoKit is a general purpose GIS toolkit wich is particulary usefull for conducting land eligibility analysis.
  license: MIT
  license_file: MIT-LICENSE.txt

extra:
  recipe-maintainers:
    - chrisjwin
    - shitabishmam
    - julian-belina
    - phil-fzj
